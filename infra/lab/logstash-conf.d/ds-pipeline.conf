# ============================================================
# DeepSecurity Lab — Logstash Pipeline 配置
# 接收 Beats/Syslog → 过滤 → 输出到 Elasticsearch
# ============================================================

input {
  beats {
    port => 5044
  }
  syslog {
    port => 514
  }
}

filter {
  # 解析时间戳
  date {
    match => ["timestamp", "ISO8601"]
    remove_field => ["timestamp"]
  }

  # 按 host_role 字段打标签
  if [fields][host_role] == "dmz_web" {
    mutate { add_tag => ["dmz", "low_security"] }
  }
  if [fields][host_role] == "db_internal" {
    mutate { add_tag => ["internal", "high_security"] }
  }
  if [fields][host_role] == "dc_ad" {
    mutate { add_tag => ["internal", "high_security", "domain_controller"] }
  }
  if [fields][host_role] == "win_workspace" {
    mutate { add_tag => ["internal", "high_security", "workstation"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ds-lab-%{+YYYY.MM.dd}"
  }
  # 调试：同时输出到 stdout（docker compose logs logstash 可查看）
  stdout {
    codec => rubydebug
  }
}
